scraper:
  data_dir: data/unstructured
  rdf_output_dir: lindas/data/rdf
  log_level: INFO
  progress_description: Fetching articles
  commands:
    - discover
    - fetch
    - parse
    - filter-disease
    - extract-reports
    - export-rdf
  files:
    manifest: manifest.jsonl
    articles: articles.jsonl
    parse_errors: parse_errors.jsonl
    disease_articles: disease_articles.jsonl
    disease_reports: disease_reports.jsonl

sources:
  gefluegelnews:
    output_dir: gefluegelnews
    timeout_seconds: 20.0
    delay_seconds: 0.5
    limit:
  padi_web:
    output_dir: padi_web
    timeout_seconds: 20.0
    delay_seconds: 0.5
    limit:

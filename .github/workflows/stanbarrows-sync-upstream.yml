# Merges upstream main into this fork about hourly (UTC :17).
#
# GitHub schedule is best-effort: runs may be delayed tens of minutes under load.
# Use workflow_dispatch for an immediate sync.
#
# Runs only on the StanBarrows fork (skipped on BLV-OSAV-USAV upstream).
# On a new fork, enable this workflow under Actions if scheduled runs never appear.
# After 60 days without repo commits, GitHub disables scheduled workflows until
# re-enabled or a new commit is pushed.
#
# Required secret (fork Settings → Secrets and variables → Actions):
#   MY_GITHUB_TOKEN — same secret as stanbarrows-push-laravel. Classic PAT (repo
#   scope) or fine-grained PAT for StanBarrows with Contents: Read and write AND
#   Workflows: Read and write on GovTech-Hackathon-2026-Tierseuchen-Screener.
#   (PAT only — not a valid key under workflow permissions:.)
#   Workflows permission is required when upstream changes .github/workflows/*.
#
# Upstream: https://github.com/BLV-OSAV-USAV/GovTech-Hackathon-2026-Tierseuchen-Screener

name: stanbarrows-sync-upstream

on:
  schedule:
    # ~hourly, UTC; offset avoids :00 load spike (GitHub schedule is best-effort)
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_OWNER: BLV-OSAV-USAV
  UPSTREAM_REPO: GovTech-Hackathon-2026-Tierseuchen-Screener

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'StanBarrows/GovTech-Hackathon-2026-Tierseuchen-Screener'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Sync from upstream
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "${MY_GITHUB_TOKEN:-}" ]; then
            echo "::error::Actions secret MY_GITHUB_TOKEN is not set on this fork. Add a StanBarrows PAT with Contents + Workflows read/write on ${GITHUB_REPOSITORY}."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${MY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          REPO_JSON="$(curl -sf -H "Authorization: Bearer ${MY_GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}")" || {
            echo "::error::MY_GITHUB_TOKEN cannot read ${GITHUB_REPOSITORY}. Check PAT scope (public_repo or repo) and expiration."
            exit 1
          }

          if [ "$(printf '%s' "$REPO_JSON" | jq -r .permissions.push)" != "true" ]; then
            echo "::error::MY_GITHUB_TOKEN has no push access to ${GITHUB_REPOSITORY}. Enable public_repo (classic) or Contents: Read and write (fine-grained)."
            exit 1
          fi

          UPSTREAM="https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          git remote add upstream "$UPSTREAM"
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork main is already up to date with upstream/main."
            exit 0
          fi

          if ! git merge upstream/main --no-edit \
            -m "Sync from ${UPSTREAM_OWNER}/${UPSTREAM_REPO}@upstream/main"; then
            echo "::error::Merge conflict while syncing upstream/main. Resolve manually on the fork, then re-run."
            git merge --abort || true
            exit 1
          fi

          git push origin main
